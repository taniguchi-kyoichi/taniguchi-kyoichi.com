<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" sizes="48x48" />
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- LCP element: preload the hero avatar so it starts before hydration. -->
		<link rel="preload" as="image" href="%sveltekit.assets%/profile.jpg" fetchpriority="high" />
		<!-- Inter (Latin) only — Japanese uses the native system font stack (no download).
		     Loaded non-render-blocking via the print-media swap so it never delays paint. -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			/>
		</noscript>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
