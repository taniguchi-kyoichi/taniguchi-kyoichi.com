name = "kyoichi-portfolio"
# Bumped for the AI SDK on workerd: a recent date enables real AsyncLocalStorage under nodejs_compat
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Workers AI binding — powers the /ask AI agent (free tier, no API key).
# Accessible from SvelteKit server endpoints via platform.env.AI
[ai]
binding = "AI"

# KV for /api/chat abuse protection: per-IP rate limits + a global daily cap
# so a bot can't drain the Workers AI quota (free) or run up cost (paid).
[[kv_namespaces]]
binding = "CHAT_LIMITS"
id = "e1a0f7df4862482fb2cd1e9c40c4e84b"

[vars]
# Add environment variables here if needed
