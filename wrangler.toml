name = "kyoichi-portfolio"
# Bumped for the AI SDK on workerd: a recent date enables real AsyncLocalStorage under nodejs_compat
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Workers AI binding — powers the /ask AI agent (free tier, no API key).
# Accessible from SvelteKit server endpoints via platform.env.AI
[ai]
binding = "AI"

